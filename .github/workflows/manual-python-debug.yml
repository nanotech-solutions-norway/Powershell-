name: Manual - Python Debug

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Target environment"
        required: true
        type: choice
        default: development
        options:
          - development
      diagnostic_level:
        description: "Diagnostic set"
        required: true
        type: choice
        default: baseline
        options:
          - baseline
          - dependencies
          - repository

permissions:
  contents: read
  actions: read

jobs:
  python-debug:
    name: Python debug diagnostics
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: |
            python/requirements.txt
            python/requirements-dev.txt

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r python/requirements.txt
          python -m pip install -r python/requirements-dev.txt

      - name: Enforce debug policy
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ inputs.target_environment }}" != "development" ]; then
            echo "Foundation debug only permits target_environment=development."
            exit 1
          fi

      - name: Collect sanitized Python diagnostics
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/python-debug
          python -m python.tools.debug_environment \
            --diagnostic-level "${{ inputs.diagnostic_level }}" \
            --output-dir "artifacts/python-debug" | tee artifacts/python-debug/stdout.txt

      - name: Upload Python debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-debug-artifacts
          path: artifacts/python-debug/**
          if-no-files-found: warn
