name: CI - Python Quality Gate

on:
  push:
    branches: [ main ]
    paths:
      - "python/**"
      - ".github/workflows/ci-python-quality.yml"
      - "docs/PYTHON_CONTROL_PLANE.md"
      - "docs/CHATGPT_PYTHON_ORCHESTRATOR_COMMANDS.md"
  pull_request:
    branches: [ main ]
    paths:
      - "python/**"
      - ".github/workflows/ci-python-quality.yml"
      - "docs/PYTHON_CONTROL_PLANE.md"
      - "docs/CHATGPT_PYTHON_ORCHESTRATOR_COMMANDS.md"
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  python-quality:
    name: Python quality gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: |
            python/requirements.txt
            python/requirements-dev.txt

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r python/requirements.txt
          python -m pip install -r python/requirements-dev.txt

      - name: Run Ruff format check
        shell: bash
        run: |
          set -euo pipefail
          python -m ruff format --check python

      - name: Run Ruff lint
        shell: bash
        run: |
          set -euo pipefail
          python -m ruff check python

      - name: Run mypy typing validation
        shell: bash
        run: |
          set -euo pipefail
          python -m mypy python/scripts python/tools

      - name: Run pytest
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p TestResults/python
          python -m pytest python/tests --junitxml=TestResults/python/pytest-results.xml

      - name: Upload Python test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-quality-test-results
          path: TestResults/python/*.xml
          if-no-files-found: warn
