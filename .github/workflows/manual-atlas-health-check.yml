name: Manual - Atlas Health Check

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Target environment"
        required: true
        type: choice
        default: development
        options:
          - development
          - staging
          - production
      base_url:
        description: "Atlas base URL or domain"
        required: true
        default: "https://www.atlas-ai.no"
      path:
        description: "HTTP health path; ignored for DNS mode"
        required: true
        default: "/"
      check_mode:
        description: "Health check mode"
        required: true
        type: choice
        default: dns
        options:
          - dns
          - http
      fail_on_unhealthy:
        description: "Fail the workflow if endpoint is not healthy"
        required: true
        type: choice
        default: "false"
        options:
          - "false"
          - "true"

permissions:
  contents: read
  actions: read

jobs:
  atlas-health-check:
    name: Atlas health check
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Run Atlas health check
        shell: pwsh
        env:
          ATLAS_HEALTH_BEARER_TOKEN: ${{ secrets.ATLAS_HEALTH_BEARER_TOKEN }}
        run: |
          $params = @{
            BaseUrl = "${{ inputs.base_url }}"
            Path = "${{ inputs.path }}"
            CheckMode = "${{ inputs.check_mode }}"
            TargetEnvironment = "${{ inputs.target_environment }}"
            WriteMode = "read_only"
          }

          if ("${{ inputs.fail_on_unhealthy }}" -eq "true") {
            $params.FailOnUnhealthy = $true
          }

          ./scripts/atlas/Get-AtlasEndpointHealth.ps1 @params

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atlas-health-evidence
          path: evidence/*.json
          if-no-files-found: warn
