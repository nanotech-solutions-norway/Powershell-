name: Manual - Python Run Script

on:
  workflow_dispatch:
    inputs:
      script_name:
        description: "Approved Python script to run"
        required: true
        type: choice
        default: hello_control_plane
        options:
          - hello_control_plane
      target_environment:
        description: "Target environment"
        required: true
        type: choice
        default: development
        options:
          - development
      run_mode:
        description: "Execution mode"
        required: true
        type: choice
        default: read_only
        options:
          - read_only

permissions:
  contents: read
  actions: read

jobs:
  run-approved-python-script:
    name: Run approved Python script
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: |
            python/requirements.txt
            python/requirements-dev.txt

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r python/requirements.txt

      - name: Enforce foundation execution policy
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ inputs.target_environment }}" != "development" ]; then
            echo "Foundation phase only permits target_environment=development."
            exit 1
          fi
          if [ "${{ inputs.run_mode }}" != "read_only" ]; then
            echo "Foundation phase only permits run_mode=read_only."
            exit 1
          fi

      - name: Run selected approved Python script
        shell: bash
        env:
          WRITE_TOOLS_ENABLED: ${{ vars.WRITE_TOOLS_ENABLED }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/python-run
          python -m python.tools.run_approved_script \
            --script "${{ inputs.script_name }}" \
            --target-environment "${{ inputs.target_environment }}" \
            --output-dir "artifacts/python-run" | tee artifacts/python-run/stdout.txt

      - name: Upload Python script output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-approved-script-output
          path: artifacts/python-run/**
          if-no-files-found: warn
